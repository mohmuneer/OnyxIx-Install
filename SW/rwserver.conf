      <property name="dbconn" value="$$REPO_DB_TNSNAME$$"/>
   </jobStatusRepository-->
   
   <connection idleTimeOut="15" maxConnect="50">
   </connection>
   <queue maxQueueSize="1000"/>
   <!--jobRecovery auxDatFiles="yes"/-->
   
