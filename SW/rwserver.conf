<?xml version="1.0" encoding="ISO-8859-1" standalone="no"?>
<server xmlns="http://xmlns.oracle.com/reports/server" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" version="11.1.2" xsi:schemaLocation="http://xmlns.oracle.com/reports/server file:D:\oracle\ofm\ofr\as1/reports/dtd/rwserverconf.xsd">
   
   <cache class="oracle.reports.cache.RWCache">
      <property name="cacheSize" value="50"/>
      <!--property name="cacheDir" value="your cache directory"/-->
      <!--property name="maxCacheFileNumber" value="max number of cache files"/-->
   </cache>
   <!--Please do not change the id for reports engine.-->
   <!--The class specifies below is subclass of _EngineClassImplBase and implements EngineInterface.-->
   <engine class="oracle.reports.engine.EngineImpl" engLife="50" id="rwEng" maxEngine="1" minEngine="1">
      <!--property name="sourceDir" value="your reports source directory"/-->
      <!--property name="tempDir" value="your reports temp directory"/-->
      <!--property name="keepConnection" value="yes"/-->
   </engine>
   <engine class="oracle.reports.urlengine.URLEngineImpl" engLife="50" id="rwURLEng" maxEngine="1" minEngine="0"/>


    <environment id="EN">
        <envVariable name="NLS_LANGUAGE" value="AMERICAN"/>
        <envVariable name="NLS_TERRITORY" value="AMERICA"/>
        <envVariable name="REPORTS_PATH" value="D:\ultimate\onyxw\RPRT;C:\Windows\Fonts"/>
        <envVariable name="NLS_LANG" value="AMERICAN_AMERICA.AR8MSWIN1256"/>
    </environment>
    <environment id="AR">
        <envVariable name="NLS_LANGUAGE" value="ARABIC"/>
        <envVariable name="NLS_TERRITORY" value="ARABIC_SAUDI"/>
        <envVariable name="REPORTS_PATH" value="D:\ultimate\onyxw\RPRT;C:\Windows\Fonts"/>
        <envVariable name="NLS_LANG" value="ARABIC_SAUDI ARABIA.AR8MSWIN1256"/>
    </environment>


   <security class="oracle.reports.server.RWJAZNSecurity" id="rwJaznSec"/>
   
   
   
   <!--destination destype="oraclePortal" class="oracle.reports.server.DesOraclePortal">
